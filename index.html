<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>오늘의 별빛 운세</title>
    <style>
        /* CSS 변수 설정: 감성적인 밤하늘/오로라 그라데이션 컬러 */
        :root {
            --bg-gradient: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #4A1C40 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #F5F5F7;
            --text-sub: #B8B8C1;
            --point-color: #E94560;
            --point-hover: #D83A50;
            --star-color: #FFD700;
        }

        /* 기본 리셋 및 폰트 설정 (아이폰 시스템 폰트 우선) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            /* 아이폰 하단/상단 안전 영역 패딩 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 공통 레이아웃 컨테이너 */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 뷰 전환 애니메이션 클래스 */
        .view {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            flex: 1;
        }
        .view.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        /* --- 입력 화면 (Screen 1) --- */
        .intro-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 20vh; /* 시선을 약간 위로 */
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 15px;
            color: var(--text-sub);
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .input-group {
            width: 100%;
            max-width: 320px;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-sub);
            text-align: left;
        }

        input[type="date"] {
            width: 100%;
            height: 54px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-main);
            font-size: 18px;
            padding: 0 16px;
            outline: none;
            appearance: none; /* iOS 기본 스타일 제거 */
            -webkit-appearance: none;
            transition: border-color 0.3s ease;
        }
        
        /* 웹킷 기반 브라우저 달력 아이콘 색상 보정 */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.7;
        }

        input[type="date"]:focus {
            border-color: var(--point-color);
        }

        .btn {
            width: 100%;
            max-width: 320px;
            height: 56px;
            background: var(--point-color);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:active {
            background: var(--point-hover);
            transform: scale(0.98);
        }

        /* --- 결과 화면 (Screen 2) --- */
        .result-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        .result-date-info {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .result-title {
            font-size: 24px;
            font-weight: 700;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stars {
            color: var(--star-color);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .card-content {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            word-break: keep-all;
        }

        .lucky-points {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .lucky-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .lucky-label {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .lucky-value {
            font-size: 15px;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 40px;
        }

        .btn-secondary {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 24px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="inputView" class="view active">
        <div class="intro-section">
            <h1 class="title">✨ 오늘의 별빛 운세</h1>
            <p class="subtitle">당신의 생년월일이 그리는 오늘 하루의 궤적을 확인해보세요.</p>
            
            <div class="input-group">
                <label for="birthdate">생년월일</label>
                <input type="date" id="birthdate" max="2099-12-31" required>
            </div>
            
            <button class="btn" onclick="generateFortune()">오늘의 운세 보기</button>
        </div>
        <p class="disclaimer">본 운세는 재미를 위한 콘텐츠입니다.</p>
    </div>

    <div id="resultView" class="view">
        <div class="result-header">
            <p class="result-date-info" id="displayDateInfo">2000. 01. 01 입력 · 2023. 10. 26 기준</p>
            <h2 class="result-title">오늘의 운세 리포트</h2>
        </div>

        <div id="fortuneCardsContainer">
            </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">🍀 오늘의 행운 포인트</div>
            </div>
            <div class="lucky-points" id="luckyPointsContainer">
                </div>
        </div>

        <div class="action-group">
            <button class="btn btn-secondary" style="flex: 1;" onclick="resetView()">다른 날짜</button>
            <button class="btn" style="flex: 2;" onclick="copyResult()">결과 텍스트 복사</button>
        </div>
        
        <p class="disclaimer">본 운세는 재미를 위한 콘텐츠입니다.</p>
    </div>
</div>

<script>
    // --- 운세 콘텐츠 데이터 풀 ---
    const fortuneData = {
        overall: [
            "오늘은 조급함보다 흐름을 믿는 태도가 행운을 부릅니다. 예상치 못한 곳에서 작은 기쁨을 발견할 수 있는 하루입니다. 마음의 여유를 가지고 주변을 둘러보세요.",
            "새로운 시작을 하기에 아주 좋은 에너지가 가득합니다. 평소 망설였던 일이 있다면 오늘 과감하게 도전해 보세요. 당신의 직감이 올바른 길로 안내할 것입니다.",
            "잔잔하고 평온한 기운이 감도는 하루입니다. 큰 성과를 쫓기보다는 내면의 안정을 다지는 데 집중하세요. 사소한 일상의 행복이 크게 다가옵니다.",
            "과거의 경험이 현재의 문제를 해결하는 열쇠가 됩니다. 막혔던 일이 있다면 시점을 조금 바꿔보세요. 귀인의 작은 조언이 큰 도움이 될 수 있습니다."
        ],
        wealth: [
            "작은 지출은 생기지만 예상 못 한 기회도 함께 들어오는 날입니다. 투자나 재테크에 대한 새로운 정보를 얻게 될 수 있습니다. 꼼꼼하게 메모해 두면 훗날 큰 도움이 됩니다.",
            "재물운이 안정적인 궤도에 오르는 하루입니다. 불필요한 소비를 줄이고 현재의 자산을 점검해 보는 시간을 가지세요. 뜻밖의 용돈이나 소소한 이익을 기대해 봐도 좋습니다.",
            "금전적인 흐름이 원활하게 돌아갑니다. 누군가에게 베푼 작은 호의가 더 큰 물질적, 정신적 보상으로 돌아올 수 있습니다. 다만 충동구매는 주의가 필요합니다.",
            "노력한 만큼 정직하게 보상이 따르는 날입니다. 요행을 바라기보다는 계획된 지출 안에서 움직이는 것이 가장 안전합니다. 지갑 단속을 철저히 하세요."
        ],
        love: [
            "가까운 사람과의 대화에서 큰 위로를 얻을 수 있습니다. 솔직한 마음을 표현하면 관계가 더욱 깊어질 것입니다. 싱글이라면 우연한 만남을 기대해 봐도 좋습니다.",
            "상대방의 입장에서 한 번 더 생각하는 배려가 빛을 발하는 날입니다. 작은 오해가 생길 수 있으나 부드러운 미소로 쉽게 넘길 수 있습니다. 따뜻한 말 한마디를 먼저 건네보세요.",
            "당신의 매력이 자연스럽게 돋보이는 하루입니다. 자신감 있는 태도가 좋은 인연을 끌어당깁니다. 소중한 사람과 맛있는 식사를 하며 시간을 보내는 것을 추천합니다.",
            "마음의 거리가 한층 가까워지는 계기가 생깁니다. 평소 표현하지 못했던 고마움이나 애정을 작은 문자 메시지로라도 전해보세요. 관계의 온도가 확연히 올라갈 것입니다."
        ],
        health: [
            "규칙적인 식사와 가벼운 스트레칭이 활력을 크게 높여줍니다. 무리한 운동보다는 산책이나 요가로 몸을 이완시키는 것이 좋습니다. 충분한 수분 섭취를 잊지 마세요.",
            "에너지가 넘치고 컨디션이 매우 좋은 하루입니다. 밀려있던 신체 활동이나 야외 스포츠를 즐기기에 제격입니다. 다만 저녁에는 충분한 휴식을 취해 에너지를 보충하세요.",
            "신체 리듬이 다소 불규칙할 수 있으니 무리는 금물입니다. 오늘 하루는 템포를 늦추고 눈의 피로를 풀어주는 데 집중하세요. 따뜻한 차 한 잔이 큰 도움이 됩니다.",
            "가벼운 땀을 흘리는 것이 기분 전환에 최고입니다. 정신적인 스트레스가 몸으로 나타날 수 있으니, 좋아하는 음악을 들으며 걷는 시간을 꼭 가져보세요."
        ],
        work: [
            "집중력이 평소보다 크게 향상되어 어려운 과제도 거뜬히 해결할 수 있습니다. 동료나 친구들과의 협업에서 당신의 아이디어가 빛을 발합니다. 자신감을 가지세요.",
            "새로운 지식을 습득하기에 매우 유리한 날입니다. 평소 관심 있던 분야의 책을 읽거나 강의를 들으면 깊은 깨달음을 얻게 됩니다. 메모하는 습관이 좋은 결과로 이어집니다.",
            "성실하게 쌓아온 노력이 서서히 빛을 보기 시작합니다. 주변에서 당신의 책임감을 높게 평가하고 있습니다. 지금의 페이스를 유지하며 묵묵히 나아가세요.",
            "갑작스러운 일정 변경이 생길 수 있으나 유연하게 대처할 수 있습니다. 완벽함보다는 빠른 실행력이 더 중요한 하루입니다. 우선순위를 잘 세워 움직이세요."
        ]
    };

    const luckyData = {
        colors: ["네이비 블루", "코랄 핑크", "에메랄드 그린", "소프트 라벤더", "웜 그레이", "머스터드 옐로우", "크림 화이트", "올리브 그린"],
        numbers: [3, 7, 8, 12, 17, 21, 24, 33],
        times: ["오전 10시", "낮 12시", "오후 3시", "저녁 7시", "밤 9시", "자정"],
        advices: ["미소 잃지 않기", "따뜻한 차 마시기", "하늘 한 번 올려다보기", "심호흡 크게 3번 하기", "먼저 인사 건네기", "책상 주변 정리하기"]
    };

    const categoryMeta = [
        { id: 'overall', title: '종합운', icon: '🌟' },
        { id: 'wealth', title: '재물운', icon: '💰' },
        { id: 'love', title: '연애운', icon: '💖' },
        { id: 'health', title: '건강운', icon: '🌿' },
        { id: 'work', title: '일/학업운', icon: '📚' }
    ];

    // --- 유틸리티 및 로직 함수 ---

    // 날짜 포맷 함수 (YYYY. MM. DD)
    function formatDateStr(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        return `${y}. ${m}. ${d}`;
    }

    // 시드 생성 함수 (생년월일 + 오늘날짜 문자열을 해시값으로 변환)
    function generateSeed(birthStr, todayStr) {
        let str = birthStr + todayStr;
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash; // 32bit integer 변환
        }
        return Math.abs(hash);
    }

    // 시드 기반 난수 생성기 (Mulberry32)
    function seededRandom(seed) {
        return function() {
            var t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    // 배열에서 시드 기반 랜덤 아이템 추출
    function getRandomItem(array, randomFunc) {
        const index = Math.floor(randomFunc() * array.length);
        return array[index];
    }

    // 별점 생성 (3~5개)
    function getStars(randomFunc) {
        const score = Math.floor(randomFunc() * 3) + 3; // 3, 4, 5 중 하나
        let stars = '';
        for(let i=0; i<5; i++) {
            stars += (i < score) ? '★' : '☆';
        }
        return stars;
    }

    // 전역 변수 (복사 기능을 위해 저장)
    let currentFortuneText = '';

    // --- 메인 동작 함수 ---

    function generateFortune() {
        const birthInput = document.getElementById('birthdate').value;
        
        // 1. 입력 검증
        if (!birthInput) {
            alert('생년월일을 입력해주세요.');
            return;
        }

        const birthDateObj = new Date(birthInput);
        const todayObj = new Date();
        
        if (birthDateObj > todayObj) {
            alert('미래의 날짜는 입력할 수 없습니다. 올바른 생년월일을 선택해주세요.');
            return;
        }

        // 2. 시드 및 난수 생성기 초기화
        const todayStr = `${todayObj.getFullYear()}-${todayObj.getMonth() + 1}-${todayObj.getDate()}`;
        const seed = generateSeed(birthInput, todayStr);
        const rand = seededRandom(seed);

        // 3. UI 업데이트 (날짜 정보)
        document.getElementById('displayDateInfo').innerText = 
            `${formatDateStr(birthDateObj)} 입력 · ${formatDateStr(todayObj)} 기준`;

        // 4. 운세 카드 생성
        const container = document.getElementById('fortuneCardsContainer');
        container.innerHTML = '';
        currentFortuneText = `✨ [오늘의 별빛 운세] ✨\n기준일: ${formatDateStr(todayObj)}\n\n`;

        categoryMeta.forEach(cat => {
            const content = getRandomItem(fortuneData[cat.id], rand);
            const stars = getStars(rand);
            
            // HTML 생성
            const cardHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">${cat.icon} ${cat.title}</div>
                        <div class="stars">${stars}</div>
                    </div>
                    <div class="card-content">${content}</div>
                </div>
            `;
            container.innerHTML += cardHTML;

            // 복사용 텍스트 누적
            currentFortuneText += `${cat.icon} ${cat.title} (${stars})\n${content}\n\n`;
        });

        // 5. 행운 포인트 생성
        const lColor = getRandomItem(luckyData.colors, rand);
        const lNum = getRandomItem(luckyData.numbers, rand);
        const lTime = getRandomItem(luckyData.times, rand);
        const lAdvice = getRandomItem(luckyData.advices, rand);

        document.getElementById('luckyPointsContainer').innerHTML = `
            <div class="lucky-item">
                <div class="lucky-label">행운의 색</div>
                <div class="lucky-value">${lColor}</div>
            </div>
            <div class="lucky-item">
                <div class="lucky-label">행운의 숫자</div>
                <div class="lucky-value">${lNum}</div>
            </div>
            <div class="lucky-item">
                <div class="lucky-label">행운의 시간대</div>
                <div class="lucky-value">${lTime}</div>
            </div>
            <div class="lucky-item">
                <div class="lucky-label">오늘의 조언</div>
                <div class="lucky-value" style="font-size:13px;">${lAdvice}</div>
            </div>
        `;

        currentFortuneText += `🍀 [오늘의 행운 포인트]\n- 색상: ${lColor}\n- 숫자: ${lNum}\n- 시간: ${lTime}\n- 조언: ${lAdvice}`;

        // 6. 화면 전환
        switchView('resultView');
    }

    // 텍스트 클립보드 복사
    function copyResult() {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(currentFortuneText).then(() => {
                alert('운세 결과가 클립보드에 복사되었습니다!');
            }).catch(() => {
                fallbackCopyTextToClipboard(currentFortuneText);
            });
        } else {
            fallbackCopyTextToClipboard(currentFortuneText);
        }
    }

    // 구형 브라우저/iOS 일부 대응 복사 폴백
    function fallbackCopyTextToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert('운세 결과가 복사되었습니다!');
        } catch (err) {
            alert('복사에 실패했습니다. 직접 드래그하여 복사해주세요.');
        }
        document.body.removeChild(textArea);
    }

    // 뷰 전환 (페이드 인/아웃)
    function switchView(targetId) {
        document.querySelectorAll('.view').forEach(view => {
            view.classList.remove('active');
            setTimeout(() => {
                if(!view.classList.contains('active')) view.style.display = 'none';
            }, 300); // fade out 대기
        });

        const target = document.getElementById(targetId);
        target.style.display = 'flex';
        // reflow 강제 발생 후 클래스 추가하여 애니메이션 작동
        void target.offsetWidth; 
        target.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 다시 보기 (입력 화면으로)
    function resetView() {
        switchView('inputView');
    }

    // 기본 날짜 세팅 (오늘보다 20년 전을 기본값으로 하여 편의성 증대 - 옵션)
    window.onload = function() {
        const input = document.getElementById('birthdate');
        // max 속성에 오늘 날짜 세팅
        const today = new Date();
        const maxStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        input.max = maxStr;
    }
</script>

</body>
</html>
